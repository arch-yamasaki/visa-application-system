<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visa Autofill</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Visa Autofill</h1>
      <section id="firestoreSection">
        <div class="fieldGroup">
          <label for="caseSelect">案件一覧</label>
          <div class="inlineControls">
            <select id="caseSelect" aria-label="案件一覧">
              <option value="">案件一覧を読み込み中...</option>
            </select>
            <button id="refreshCases" type="button" class="secondaryButton">更新</button>
          </div>
          <p id="caseListStatus" class="subtleStatus" aria-live="polite">起動時に案件一覧を取得します</p>
        </div>
        <div id="workflowWarning" class="warning" hidden>
          ⚠ このケースは入力可能状態ではありません（状態: <span id="wfState"></span>）
        </div>
        <div id="workflowReady" class="ready" hidden>
          ✓ 抽出済み: 入力できます
        </div>
        <button id="loadFromApi" type="button">visa-appから読込</button>
      </section>
      <hr>
      <button id="fill" type="button">一括入力</button>
      <details>
        <summary>オプション</summary>
        <button id="fillProgressive" type="button">ゆっくり入力</button>
      </details>
      <pre id="status" aria-live="polite">データ未読込</pre>
    </main>
    <script src="api_client.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
