<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visa Autofill</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Visa Autofill</h1>
      <section id="firestoreSection">
        <h2>visa-app から読込</h2>
        <input id="caseId" type="text" placeholder="case_id を入力">
        <div id="workflowWarning" class="warning" hidden>
          ⚠ このケースは入力可能状態ではありません（状態: <span id="wfState"></span>）
        </div>
        <div id="workflowReady" class="ready" hidden>
          ✓ 抽出済み: 入力できます
        </div>
        <button id="loadFromApi" type="button">visa-appから読込</button>
        <a href="#" id="setApiUrl">接続先設定</a>
      </section>
      <hr>
      <button id="loadBundled" type="button">同梱データを使う</button>
      <button id="fill" type="button">一括入力</button>
      <button id="fillProgressive" type="button">ゆっくり入力</button>
      <button id="preview" type="button">入力対象を確認</button>
      <pre id="status" aria-live="polite">データ未読込</pre>
    </main>
    <script src="api_client.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
